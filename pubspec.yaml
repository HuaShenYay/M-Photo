name: watermark_frame_tool
description: "A lightweight watermark and frame tool for Windows desktop."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.1

dependencies:
  flutter:
    sdk: flutter

  # Core functionality
  file_picker: ^10.3.10
  path_provider: ^2.1.4
  path: ^1.9.0
  
  # Image processing
  image: ^4.3.0
  
  # State management
  provider: ^6.1.2
  get_it: ^9.2.1
  
  # UI
  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
